<section id="services" class="py-20 bg-black sm:py-32">
  <div class="container mx-auto px-6">
    <div class="text-center max-w-3xl mx-auto">
      <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">Gateway to Our Expertise</h2>
      <p class="mt-4 text-lg text-gray-400">
        From corporate galas to cultural festivals, we orchestrate events that resonate. Explore our specialized services designed to bring any vision to life.
      </p>
    </div>
    <div class="mt-16 grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-4">
      @for (service of services; track service.title) {
        <div class="relative group p-6 border border-cyan-400/20 rounded-lg bg-gray-900/40 hover:bg-gray-900/60 transition-all duration-300 overflow-hidden">
          <div class="absolute top-0 left-0 h-full w-full bg-gradient-to-br from-cyan-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
          <div class="absolute -top-1/2 -right-1/2 h-full w-full bg-cyan-400/10 rounded-full blur-3xl opacity-0 group-hover:opacity-50 transition-opacity duration-500"></div>

          <div class="relative z-10 flex flex-col items-start">
            <div class="p-3 bg-cyan-900/50 border border-cyan-400/30 rounded-md text-cyan-300" [innerHTML]="service.icon"></div>
            <h3 class="mt-6 text-xl font-semibold text-white">{{ service.title }}</h3>
            <p class="mt-2 text-sm text-gray-400">{{ service.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
