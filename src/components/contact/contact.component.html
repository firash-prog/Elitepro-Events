<section id="contact" class="py-20 sm:py-32 bg-black">
  <div class="container mx-auto px-6">
    <div class="text-center max-w-3xl mx-auto">
      <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">Start Your Event Journey</h2>
      <p class="mt-4 text-lg text-gray-400">
        Have an idea? Let's make it a reality. Reach out to our team for a consultation and let's begin crafting your next unforgettable experience.
      </p>
    </div>
    <div class="mt-16 max-w-2xl mx-auto">
      @if (submitted()) {
        <div class="bg-teal-900/50 border border-teal-500 text-teal-200 px-4 py-3 rounded-md relative text-center" role="alert">
          <strong class="font-bold">Thank you!</strong>
          <span class="block sm:inline"> Your message has been sent. We'll be in touch soon.</span>
        </div>
      } @else {
        <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" novalidate>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              <label for="name" class="block text-sm font-medium text-gray-300 mb-2">Name</label>
              <input type="text" id="name" formControlName="name" class="w-full bg-gray-900 border border-gray-700 rounded-md py-2 px-4 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition">
            </div>
            <div>
              <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
              <input type="email" id="email" formControlName="email" class="w-full bg-gray-900 border border-gray-700 rounded-md py-2 px-4 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition">
            </div>
          </div>
          <div class="mt-6">
            <label for="subject" class="block text-sm font-medium text-gray-300 mb-2">Subject</label>
            <input type="text" id="subject" formControlName="subject" class="w-full bg-gray-900 border border-gray-700 rounded-md py-2 px-4 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition">
          </div>
          <div class="mt-6">
            <label for="message" class="block text-sm font-medium text-gray-300 mb-2">Message</label>
            <textarea id="message" formControlName="message" rows="4" class="w-full bg-gray-900 border border-gray-700 rounded-md py-2 px-4 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition"></textarea>
          </div>
          <div class="mt-8 text-center">
            <button type="submit" [disabled]="loading()" class="inline-flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-md text-black bg-gradient-to-r from-teal-400 to-cyan-500 hover:from-teal-500 hover:to-cyan-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cyan-500 focus:ring-offset-black disabled:opacity-50 disabled:cursor-not-allowed transition duration-300">
              @if (loading()) {
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Sending...</span>
              } @else {
                <span>Send Message</span>
              }
            </button>
          </div>
        </form>
      }
    </div>
  </div>
</section>
