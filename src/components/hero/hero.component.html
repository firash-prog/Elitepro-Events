<section id="home" class="min-h-screen flex items-center justify-center relative bg-cover bg-center bg-no-repeat" style="background-image: url('https://images.unsplash.com/photo-1618022037140-5ea7c6151197?q=80&w=2070&auto=format&fit=crop');">
  <div class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
  <div class="relative z-10 text-center text-white px-4">
    <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold mb-4 tracking-tight animate-fade-in-down">
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-teal-300 to-cyan-500">ElitePro</span> Event Management
    </h1>
    <p class="text-lg md:text-2xl text-gray-300 max-w-3xl mx-auto animate-fade-in-up" style="animation-delay: 0.5s;">
      Crafting Unforgettable Experiences. Your Vision, Our Expertise.
    </p>
  </div>
  <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-10">
    <a href="#services" (click)="scrollTo('services', $event)" class="animate-bounce">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
    </a>
  </div>
</section>
